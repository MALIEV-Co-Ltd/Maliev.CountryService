name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: country_service_test_db
          PGDATA: /var/lib/postgresql/data/pgdata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore Maliev.CountryService.sln

      - name: Build solution
        run: dotnet build Maliev.CountryService.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Maliev.CountryService.sln --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__CountryDbContext: "Server=localhost;Port=5432;Database=country_test_db;User Id=postgres;Password=postgres;"

      - name: Check for warnings
        run: |
          if dotnet build Maliev.CountryService.sln --no-restore --configuration Release 2>&1 | grep -i "warning"; then
            echo "Build contains warnings. Please fix all warnings."
            exit 1
          fi
          echo "Build is clean - no warnings found"
